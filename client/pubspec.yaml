name: zipp
description: "Zipp — private E2E encrypted messaging"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.5

  # Networking
  dio: ^5.9.2
  web_socket_channel: ^3.0.3
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.4.0
  path_provider: ^2.1.4

  # Open URLs in system browser (for OAuth linking)
  url_launcher: ^6.3.1

  # E2E encryption (pure Dart)
  cryptography: ^2.7.0

  # Secure private key storage
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.1.0

  # Animations
  flutter_animate: ^4.5.0

  # Emoji picker
  emoji_picker_flutter: ^4.4.0

  # Image/GIF display with caching
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Clipboard image support
  pasteboard: ^0.3.0

  # File/image picking + drag-and-drop (desktop + web)
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0

  # Video playback
  video_player: ^2.9.3
  chewie: ^1.8.5

  # Date/time formatting
  intl: ^0.20.2

  # Local preferences (theme, onboarding)
  shared_preferences: ^2.3.4

  # Jump to replied message in list
  scrollable_positioned_list: ^0.3.8

  # Desktop window management (intercept close, hide/show)
  window_manager: ^0.4.3

  # System tray icon with context menu (Linux/Windows)
  tray_manager: ^0.2.3

  # Desktop notifications (Linux/Windows)
  flutter_local_notifications: ^18.0.1

  # Web API access (browser Notification API)
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#0A0E1A"
    theme_color: "#0A0E1A"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48
  linux:
    generate: true
    image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
