name: Build Flutter Clients

on:
  push:
    branches: [main]
    paths: [client/**, .github/workflows/build-clients.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: client
        run: flutter pub get

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libayatana-appindicator3-dev \
            libmpv-dev

      - name: Build web
        working-directory: client
        run: flutter build web --release

      - name: Build Linux
        working-directory: client
        run: flutter build linux --release

      - name: Package bundles
        run: |
          tar -czf zipp-web.tar.gz -C client/build/web .
          tar -czf zipp-linux.tar.gz -C client/build/linux/x64/release/bundle .

      - name: Compute hashes
        id: hashes
        run: |
          echo "web_sha256=$(nix-hash --type sha256 --base32 --flat zipp-web.tar.gz 2>/dev/null || sha256sum zipp-web.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_sha256=$(nix-hash --type sha256 --base32 --flat zipp-linux.tar.gz 2>/dev/null || sha256sum zipp-linux.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="client-$(date -u +%Y%m%d)-${GITHUB_SHA::8}"
          gh release create "$TAG" \
            --title "Client build $TAG" \
            --notes "Automated Flutter client build.

          **Web hash:** \`${{ steps.hashes.outputs.web_sha256 }}\`
          **Linux hash:** \`${{ steps.hashes.outputs.linux_sha256 }}\`" \
            zipp-web.tar.gz \
            zipp-linux.tar.gz
